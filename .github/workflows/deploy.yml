name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: solobase-site

      - uses: actions/checkout@v4
        with:
          repository: suppers-ai/site-kit
          path: site-kit

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: solobase-site/package-lock.json

      - run: npm ci
        working-directory: solobase-site
      - run: npm run build
        working-directory: solobase-site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: solobase-site/dist/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
